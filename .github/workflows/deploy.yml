name: Deploy to VPS
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            # Masuk ke folder backend
            cd ~/frontend_ams

            # Ambil perubahan terbaru dari GitHub
            git pull origin master

            # Masuk ke folder docker-compose
            cd ~/ams-deploy

            # Build ulang image jika ada perubahan
            # Container lama akan diganti dengan yang baru
            # Volume mysql_data TIDAK akan dihapus
            docker compose up -d --build --remove-orphans